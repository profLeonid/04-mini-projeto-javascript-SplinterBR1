<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste de Aptidão</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main>
    <div class="conteudo">
      <a href="../index.html" class="voltar">← Voltar</a>

      <h1>
        Teste de <span>Aptidão</span>
      </h1>
      <p class="descricao">
        Digite o tempo, em segundos, da corrida de 100m.
      </p>

      <label>Tempo (s)</label>
      <input type="number" id="entrada" placeholder="Ex: 13.8" />

      <button onclick="aptidao()">Avaliar</button>

      <div class="resultado" id="retorno">
        O resultado aparecerá aqui
      </div>
    </div>
  </main>

  <footer>
    <p>Prof. Fernando Leonid</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
